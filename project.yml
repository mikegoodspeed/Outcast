name: Outcast
options:
  bundleIdPrefix: com.mike
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
    TARGETED_DEVICE_FAMILY: 1,2
    SUPPORTS_MACCATALYST: NO
targets:
  Outcast:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Outcast
    info:
      path: Outcast/Info.plist
      properties:
        CFBundleDisplayName: Outcast
        UIApplicationSupportsIndirectInputEvents: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).SceneDelegate"
        UILaunchScreen: {}
        UIStatusBarHidden: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIViewControllerBasedStatusBarAppearance: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mike.Outcast
        PRODUCT_NAME: Outcast
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  OutcastTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: OutcastTests
    dependencies:
      - target: Outcast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mike.OutcastTests
        GENERATE_INFOPLIST_FILE: YES
  OutcastUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: OutcastUITests
    dependencies:
      - target: Outcast
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mike.OutcastUITests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Outcast:
    build:
      targets:
        Outcast: all
    test:
      gatherCoverageData: false
      targets:
        - name: OutcastTests
        - name: OutcastUITests
    run:
      config: Debug
    archive:
      config: Release
